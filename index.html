<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-1 Premium</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root {
            --apple-blue: #007AFF;
            --apple-bg: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(0, 0, 0, 0.08);
            --text-main: #1d1d1f;
            --text-sec: #86868b;
            --apple-red: #ff3b30;
            --system-gray: #f2f2f7;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            margin: 0;
            font-family: "SF Pro Display", -apple-system, sans-serif;
            background-color: #000;
            background-image: radial-gradient(at 0% 0%, rgba(0,122,255,0.15) 0px, transparent 50%), white;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 40px;
            width: 92%;
            max-width: 400px;
            max-height: 85vh;
            padding: 35px 25px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        h1 { font-size: 34px; font-weight: 800; margin: 0 0 5px; letter-spacing: -1.5px; }
        .sub-status { color: var(--text-sec); font-size: 13px; margin-bottom: 25px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }

        .apple-btn {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .apple-btn svg { width: 24px; height: 24px; stroke: var(--apple-blue); fill: none; stroke-width: 2.5; transition: transform 0.3s ease; }
        .apple-btn:hover svg { transform: translateY(-3px); }
        .apple-btn:active { transform: scale(0.95); }

        .btn-connect {
            grid-column: span 2;
            background: var(--apple-blue);
            border: none;
            padding: 18px;
            border-radius: 18px;
            color: white;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.2);
        }

        input[type="text"] {
            width: 100%; background: rgba(0,0,0,0.05); border: 1px solid transparent;
            border-radius: 15px; padding: 15px; text-align: center; font-size: 20px; 
            font-weight: 700; margin: 10px 0; transition: 0.3s;
        }
        input[type="text"]:focus { background: #fff; border-color: var(--apple-blue); }

        /* LISTA DE ARQUIVOS */
        #file-list {
            margin-top: 15px;
            text-align: left;
            overflow-y: auto;
            flex: 1;
            padding-right: 5px;
        }
        .file-item {
            background: rgba(255,255,255,0.6);
            border: 1px solid var(--glass-border);
            padding: 12px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            animation: fadeIn 0.4s ease;
        }
        .file-icon { font-size: 20px; background: #fff; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 10px; }
        .file-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }

        /* NOVOS ESTILOS PARA CHAT SEM MUDAR O RESTO */
        .chat-bubble { padding: 10px 15px; border-radius: 15px; margin-bottom: 8px; font-size: 13px; max-width: 80%; word-wrap: break-word; }
        .sent { background: var(--apple-blue); color: white; align-self: flex-end; margin-left: auto; }
        .received { background: #e9e9eb; color: var(--text-main); align-self: flex-start; }
        .chat-input-area { display: flex; gap: 5px; margin-top: 10px; }
        #chat-input { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--glass-border); font-size: 14px; }

        /* MODAIS E CÂMERA */
        #qr-modal, #scanner-modal {
            display: none; position: fixed; inset: 0; background: #fff;
            z-index: 999; flex-direction: column; align-items: center; justify-content: center;
        }
        #reader { width: 100% !important; max-width: 350px; border-radius: 20px; overflow: hidden; border: none !important; }
        #reader video { border-radius: 20px; object-fit: cover; }

        .status-dot { width: 8px; height: 8px; background: var(--apple-red); border-radius: 50%; transition: 0.3s; }
        .online { background: #34c759; box-shadow: 0 0 10px #34c759; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="glass-container">
        <h1>Z-1</h1>
        <div class="sub-status">
            <div class="status-dot" id="dot"></div>
            <span id="status-text">Conectando...</span>
        </div>

        <div id="setup-view">
            <div class="action-grid">
                <button class="apple-btn" onclick="openQR()">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    MEU QR
                </button>
                <button class="apple-btn" onclick="openScanner()">
                    <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h18a2 2 0 0 1 2 2z"></path><path d="M12 8v8"></path><path d="M8 12h8"></path></svg>
                    ESCANEAR
                </button>
            </div>
            <input type="text" id="manual-id" maxlength="4" placeholder="CÓDIGO ID">
            <button class="btn-connect" onclick="connectManual()">Conectar agora</button>
        </div>

        <div id="transfer-view" style="display:none; flex-direction: column; height: 100%;">
            <div class="apple-btn" style="width:100%; margin-bottom:10px; border-style: dashed; border-color: var(--apple-blue); padding: 10px;" onclick="document.getElementById('file-input').click()">
                <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                <span>ENVIAR ARQUIVO</span>
            </div>
            
            <div id="file-list">
                <div style="font-size: 10px; font-weight: 800; color: var(--text-sec); letter-spacing: 1px; margin-bottom: 10px;">CONVERSA E ARQUIVOS</div>
            </div>

            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Mensagem...">
                <button onclick="sendChat()" style="background:var(--apple-blue); border:none; color:white; border-radius:10px; padding:0 15px; cursor:pointer;">OK</button>
            </div>
            
            <input type="file" id="file-input" hidden>
            <button onclick="disconnect()" style="background:none; border:none; color:var(--apple-red); font-weight:700; margin-top:10px; cursor:pointer; font-size:12px;">Encerrar Conexão</button>
        </div>
    </div>

    <div id="qr-modal" onclick="this.style.display='none'">
        <div id="qrcode"></div>
        <p style="font-weight:700; margin-top:20px;">Seu código de conexão</p>
        <span style="color:var(--text-sec); font-size:12px;">Toque em qualquer lugar para fechar</span>
    </div>

    <div id="scanner-modal">
        <div id="reader"></div>
        <button onclick="stopScanner()" style="margin-top:30px; padding:15px 40px; border-radius:20px; border:none; background:var(--apple-red); color:white; font-weight:700;">CANCELAR</button>
    </div>

    <script>
        let peer, conn;
        const statusText = document.getElementById('status-text');
        const dot = document.getElementById('dot');
        const fileList = document.getElementById('file-list');
        const shortId = Math.floor(1000 + Math.random() * 9000).toString();

        peer = new Peer(shortId);

        peer.on('open', (id) => {
            dot.classList.add('online');
            statusText.innerHTML = `Online • ID: <strong>${id}</strong>`;
            document.getElementById("qrcode").innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: id, width: 220, height: 220 });
        });

        peer.on('connection', (c) => {
            conn = c;
            setupConnEvents();
            initTransferUI();
        });

        function setupConnEvents() {
            conn.on('data', (data) => {
                if(data === "DISCONNECT") { resetToHome(); return; }
                if(data.isChat) {
                    addChatToUI(data.text, 'received');
                } else {
                    addFileToList(data, 'recebido');
                }
            });
            conn.on('close', resetToHome);
        }

        // FUNÇÃO DE CHAT ADICIONADA
        function sendChat() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if(msg && conn) {
                conn.send({ isChat: true, text: msg });
                addChatToUI(msg, 'sent');
                input.value = '';
            }
        }

        function addChatToUI(text, type) {
            const div = document.createElement('div');
            div.className = `chat-bubble ${type}`;
            div.innerText = text;
            fileList.appendChild(div);
            fileList.scrollTop = fileList.scrollHeight;
        }

        // MANTIDO EXATAMENTE COMO O ORIGINAL
        function addFileToList(data, type) {
            const blob = new Blob([data.file], { type: data.type });
            const url = URL.createObjectURL(blob);
            const item = document.createElement('div');
            item.className = 'file-item';
            
            let icon = '📄';
            if(data.type.includes('image')) icon = '🖼️';
            if(data.type.includes('video')) icon = '🎬';
            if(data.name.endsWith('.apk')) icon = '⚙️';

            item.innerHTML = `<div class="file-icon">${icon}</div><div class="file-details"><div class="file-name">${data.name}</div></div>`;
            item.onclick = () => {
                const a = document.createElement('a');
                a.href = url; a.download = data.name;
                (data.type.includes('image') || data.type.includes('video')) ? window.open(url, '_blank') : a.click();
            };
            fileList.appendChild(item);
            fileList.scrollTop = fileList.scrollHeight;
        }

        function openQR() { document.getElementById('qr-modal').style.display = 'flex'; }
        
        function openScanner() {
            document.getElementById('scanner-modal').style.display = 'flex';
            window.activeScanner = new Html5Qrcode("reader");
            window.activeScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (id) => {
                document.getElementById('manual-id').value = id;
                stopScanner();
                connectManual();
            });
        }

        function stopScanner() {
            if(window.activeScanner) {
                window.activeScanner.stop().then(() => {
                    document.getElementById('scanner-modal').style.display = 'none';
                });
            } else {
                document.getElementById('scanner-modal').style.display = 'none';
            }
        }

        function connectManual() {
            const id = document.getElementById('manual-id').value;
            if(!id) return;
            conn = peer.connect(id);
            conn.on('open', () => {
                setupConnEvents();
                initTransferUI();
            });
        }

        function initTransferUI() {
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('transfer-view').style.display = 'flex';
            statusText.innerText = "Conectado P2P";
        }

        function resetToHome() { location.reload(); }
        function disconnect() { if(conn) { conn.send("DISCONNECT"); setTimeout(() => resetToHome(), 500); } }

        document.getElementById('file-input').onchange = (e) => {
            const file = e.target.files[0];
            if(!file || !conn) return;
            const dataObj = { file: file, name: file.name, type: file.type };
            conn.send(dataObj);
            addFileToList(dataObj, 'enviado');
        };

        document.getElementById('chat-input').onkeypress = (e) => { if(e.key === 'Enter') sendChat(); };
    </script>
</body>
</html>

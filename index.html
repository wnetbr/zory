<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMessage P2P Ultra</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --apple-blue: #007AFF;
            --apple-gray: #8E8E93;
            --apple-bg: #F2F2F7;
            --apple-card: #FFFFFF;
            --apple-text: #000000;
            --apple-bubble-me: #007AFF;
            --apple-bubble-them: #E9E9EB;
            --apple-red: #FF3B30;
            --apple-green: #34C759;
            --apple-light-gray: #D1D1D6;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --apple-bg: #000000;
                --apple-card: #1C1C1E;
                --apple-text: #FFFFFF;
                --apple-bubble-them: #262629;
                --apple-light-gray: #3A3A3C;
            }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { margin: 0; background-color: var(--apple-bg); color: var(--apple-text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Screens */
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; position: absolute; inset: 0; background: var(--apple-bg); z-index: 1; }
        .screen.active { display: flex; z-index: 2; }

        /* Header */
        header {
            padding: 15px 20px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid var(--apple-light-gray);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }
        @media (prefers-color-scheme: dark) { header { background: rgba(28,28,30,0.8); } }

        /* Profile Styles */
        .profile-pic { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: var(--apple-light-gray); flex-shrink: 0; }
        .profile-pic-large { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 4px solid var(--apple-blue); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

        /* Contacts List */
        .contact-item {
            padding: 12px 20px;
            background: var(--apple-card);
            border-bottom: 0.5px solid var(--apple-light-gray);
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .contact-item:active { background: var(--apple-light-gray); }
        .contact-info { flex: 1; overflow: hidden; }
        .contact-name { font-weight: 600; font-size: 17px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .contact-status { font-size: 13px; color: var(--apple-gray); display: flex; align-items: center; gap: 5px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; }
        .status-online { background: var(--apple-green); }
        .status-offline { background: var(--apple-gray); }

        /* QR Scanner */
        #reader { width: 100%; max-width: 400px; margin: auto; border-radius: 20px; overflow: hidden; border: none !important; }
        #reader video { border-radius: 20px; }

        /* Buttons & Inputs */
        .apple-btn { padding: 14px 20px; border-radius: 14px; border: none; background: var(--apple-blue); color: white; font-weight: 600; cursor: pointer; font-size: 16px; transition: opacity 0.2s; }
        .apple-btn:active { opacity: 0.7; }
        .apple-input { padding: 14px; border-radius: 12px; border: 1px solid var(--apple-light-gray); background: var(--apple-card); color: var(--apple-text); width: 100%; margin-bottom: 10px; font-size: 16px; outline: none; }
        .apple-input:focus { border-color: var(--apple-blue); }

        /* Chat Messages */
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; background: var(--apple-bg); }
        .message { max-width: 75%; padding: 10px 16px; border-radius: 20px; font-size: 16px; line-height: 1.4; position: relative; word-wrap: break-word; }
        .message.me { align-self: flex-end; background: var(--apple-blue); color: white; border-bottom-right-radius: 4px; }
        .message.them { align-self: flex-start; background: var(--apple-bubble-them); color: var(--apple-text); border-bottom-left-radius: 4px; }
        .message img, .message video { max-width: 100%; border-radius: 12px; margin-top: 5px; display: block; }

        /* Input Area */
        .input-area { padding: 10px 15px 30px 15px; background: var(--apple-bg); display: flex; align-items: flex-end; gap: 10px; border-top: 0.5px solid var(--apple-light-gray); }
        .input-container { flex: 1; background: var(--apple-card); border: 0.5px solid var(--apple-light-gray); border-radius: 25px; padding: 5px 15px; display: flex; align-items: center; }
        #message-input { flex: 1; border: none; background: transparent; color: var(--apple-text); font-size: 16px; padding: 8px 0; outline: none; }

        /* Video Call Overlay */
        #video-call-overlay { display: none; position: fixed; inset: 0; background: black; z-index: 1000; flex-direction: column; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; }
        #local-video { position: absolute; top: 40px; right: 20px; width: 110px; height: 160px; border-radius: 15px; object-fit: cover; border: 2px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .call-controls { position: absolute; bottom: 50px; left: 0; right: 0; display: flex; justify-content: center; gap: 25px; }
        .call-btn { width: 65px; height: 65px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 28px; color: white; cursor: pointer; transition: transform 0.2s; }
        .call-btn:active { transform: scale(0.9); }
        .btn-hangup { background: var(--apple-red); }
        .btn-action { background: rgba(255,255,255,0.2); backdrop-filter: blur(15px); }

        /* Modals */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 500; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--apple-card); border-radius: 20px; padding: 25px; width: 100%; max-width: 350px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }

        /* Recording UI */
        #recording-ui { display: none; position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 25px; align-items: center; gap: 10px; z-index: 50; }
    </style>
</head>
<body>

    <!-- Main Screen (Contacts) -->
    <div id="main-screen" class="screen active">
        <header>
            <h1 style="font-size: 34px; margin: 0; font-weight: 800;">Mensagens</h1>
            <div style="display: flex; gap: 15px;">
                <button class="icon-btn" onclick="showScreen('profile-screen')" style="background:none; border:none; color:var(--apple-blue); font-size: 24px;"><i class="fas fa-user-circle"></i></button>
                <button class="icon-btn" onclick="showScreen('add-contact-screen')" style="background:none; border:none; color:var(--apple-blue); font-size: 24px;"><i class="fas fa-plus-circle"></i></button>
            </div>
        </header>
        <div id="contacts-list" style="flex: 1; overflow-y: auto;">
            <!-- Contacts will appear here -->
        </div>
    </div>

    <!-- Profile Screen -->
    <div id="profile-screen" class="screen">
        <header>
            <button onclick="showScreen('main-screen')" style="background:none; border:none; color:var(--apple-blue); font-size: 17px; font-weight: 500;"><i class="fas fa-chevron-left"></i> Voltar</button>
            <h2 style="margin: 0; font-size: 17px; font-weight: 600;">Meu Perfil</h2>
            <div style="width: 60px;"></div>
        </header>
        <div style="padding: 30px; display: flex; flex-direction: column; align-items: center; flex: 1; overflow-y: auto;">
            <div style="position: relative;">
                <img id="my-profile-pic-display" class="profile-pic-large" src="https://www.w3schools.com/howto/img_avatar.png">
                <button onclick="document.getElementById('profile-pic-input').click()" style="position: absolute; bottom: 20px; right: 0; background: var(--apple-blue); color: white; border: none; width: 35px; height: 35px; border-radius: 50%;"><i class="fas fa-camera"></i></button>
            </div>
            <input type="file" id="profile-pic-input" hidden accept="image/*" onchange="updateProfilePic()">
            
            <p style="color: var(--apple-gray); margin-bottom: 5px; font-size: 13px; text-transform: uppercase; width: 100%; max-width: 300px;">Nome de Usuário</p>
            <input type="text" id="username-input" class="apple-input" style="max-width: 300px;" placeholder="Seu nome">
            <button class="apple-btn" onclick="saveProfile()" style="width: 100%; max-width: 300px; margin-top: 10px;">Salvar Alterações</button>

            <div style="margin-top: 40px; text-align: center; width: 100%; background: var(--apple-card); padding: 20px; border-radius: 20px;">
                <p style="color: var(--apple-gray); margin-bottom: 10px;">Seu Código de Conexão</p>
                <div id="my-id-display" style="font-size: 28px; font-weight: 800; letter-spacing: 6px; color: var(--apple-blue); margin-bottom: 15px;">----</div>
                <div id="qrcode-display" style="background: white; padding: 10px; border-radius: 15px; display: inline-block;"></div>
            </div>
        </div>
    </div>

    <!-- Add Contact Screen -->
    <div id="add-contact-screen" class="screen">
        <header>
            <button onclick="stopScanner(); showScreen('main-screen')" style="background:none; border:none; color:var(--apple-blue); font-size: 17px;"><i class="fas fa-chevron-left"></i> Voltar</button>
            <h2 style="margin: 0; font-size: 17px;">Novo Contato</h2>
            <div style="width: 60px;"></div>
        </header>
        <div style="padding: 20px; display: flex; flex-direction: column; gap: 20px; flex: 1; overflow-y: auto;">
            <div id="reader-container" style="background: black; border-radius: 20px; overflow: hidden; position: relative; aspect-ratio: 1;">
                <div id="reader"></div>
                <div id="scanner-placeholder" style="position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; padding: 20px;">
                    <i class="fas fa-qrcode" style="font-size: 50px; margin-bottom: 15px; opacity: 0.5;"></i>
                    <p>Clique abaixo para escanear o QR Code do seu amigo</p>
                </div>
            </div>
            <button class="apple-btn" id="start-scan-btn" onclick="startScanner()"><i class="fas fa-camera"></i> Abrir Câmera para Escanear</button>
            
            <div style="display: flex; align-items: center; gap: 10px; color: var(--apple-gray);">
                <hr style="flex: 1; border: none; border-top: 0.5px solid var(--apple-light-gray);">
                <span>OU</span>
                <hr style="flex: 1; border: none; border-top: 0.5px solid var(--apple-light-gray);">
            </div>

            <div style="background: var(--apple-card); padding: 20px; border-radius: 20px;">
                <p style="margin-top: 0; font-weight: 600;">Adicionar por Código</p>
                <input type="text" id="contact-name-input" class="apple-input" placeholder="Nome do contato, como aparecerá para você">
                <input type="text" id="manual-id-input" class="apple-input" placeholder="Digite o código de 4 dígitos" maxlength="4" inputmode="numeric" pattern="[0-9]*">
                <button class="apple-btn" onclick="addContactManual()" style="width: 100%;">Conectar</button>
            </div>
        </div>
    </div>

    <!-- Chat Screen -->
    <div id="chat-screen" class="screen">
        <header>
            <div style="display: flex; align-items: center; gap: 12px; flex: 1; overflow: hidden;">
                <button onclick="showScreen('main-screen')" style="background:none; border:none; color:var(--apple-blue); font-size: 20px; padding: 0;"><i class="fas fa-chevron-left"></i></button>
                <img id="chat-profile-pic" class="profile-pic" src="https://www.w3schools.com/howto/img_avatar.png">
                <div style="overflow: hidden;">
                    <div id="chat-username" style="font-weight: 700; font-size: 17px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Usuário</div>
                    <div id="chat-status" style="font-size: 12px; color: var(--apple-gray); display: flex; align-items: center; gap: 4px;">
                        <span class="status-dot status-offline" id="chat-status-dot"></span>
                        <span id="chat-status-text">Offline</span>
                    </div>
                </div>
            </div>
            <div style="display: flex; gap: 18px;">
                <button class="icon-btn" onclick="showContactProfile(activeChatId)" style="background:none; border:none; color:var(--apple-blue); font-size: 22px;" title="Ver perfil"><i class="fas fa-circle-info"></i></button>
                <button class="icon-btn" onclick="startCall(true)" style="background:none; border:none; color:var(--apple-blue); font-size: 22px;"><i class="fas fa-video"></i></button>
                <button class="icon-btn" onclick="startCall(false)" style="background:none; border:none; color:var(--apple-blue); font-size: 22px;"><i class="fas fa-phone"></i></button>
            </div>
        </header>
        <div id="messages"></div>
        <div id="recording-ui">
            <i class="fas fa-microphone" style="color: var(--apple-red);"></i> Gravando áudio...
        </div>
        <div class="input-area">
            <label class="icon-btn" style="color:var(--apple-blue); font-size: 26px;">
                <i class="fas fa-plus-circle"></i>
                <input type="file" id="file-input" hidden onchange="sendFile()">
            </label>
            <div class="input-container">
                <input type="text" id="message-input" placeholder="iMessage" autocomplete="off">
                <button class="icon-btn" id="voice-btn" style="color:var(--apple-blue);"><i class="fas fa-microphone"></i></button>
            </div>
            <button class="icon-btn" onclick="sendMessage()" style="background:var(--apple-blue); color:white; width:34px; height:34px; border-radius:50%; font-size: 16px;"><i class="fas fa-arrow-up"></i></button>
        </div>
    </div>

    <!-- Video Call Overlay -->
    <div id="video-call-overlay">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay playsinline muted></video>
        <div class="call-controls">
            <button class="call-btn btn-action" onclick="toggleMute()"><i class="fas fa-microphone" id="call-mute-icon"></i></button>
            <button class="call-btn btn-hangup" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
            <button class="call-btn btn-action" onclick="toggleCamera()"><i class="fas fa-video" id="call-camera-icon"></i></button>
        </div>
    </div>

    <!-- Contact Profile Modal -->
    <div class="modal-overlay" id="contact-profile-modal">
        <div class="modal-content">
            <img id="contact-profile-pic-modal" class="profile-pic-large" style="width: 90px; height: 90px;" src="https://www.w3schools.com/howto/img_avatar.png">
            <h3 id="contact-profile-name-modal" style="margin: 10px 0 5px 0;">Usuário</h3>
            <p id="contact-profile-id-modal" style="color: var(--apple-gray); margin: 0 0 8px 0;">Código: ----</p>
            <p id="contact-profile-saved-name-modal" style="color: var(--apple-gray); margin: 0 0 20px 0; font-size: 14px;"></p>
            <button class="apple-btn" onclick="document.getElementById('contact-profile-modal').style.display='none'" style="width: 100%;">Fechar</button>
        </div>
    </div>

    <!-- Incoming Call Modal -->
    <div class="modal-overlay" id="incoming-call-modal">
        <div class="modal-content">
            <img id="caller-pic" class="profile-pic-large" style="width: 80px; height: 80px;" src="https://www.w3schools.com/howto/img_avatar.png">
            <h3 id="caller-name" style="margin: 10px 0 5px 0;">Amigo</h3>
            <p style="color: var(--apple-gray); margin-bottom: 25px;">Chamada de vídeo...</p>
            <div style="display: flex; justify-content: center; gap: 30px;">
                <button class="call-btn btn-hangup" onclick="rejectCall()"><i class="fas fa-times"></i></button>
                <button class="call-btn" style="background: var(--apple-green);" onclick="acceptCall()"><i class="fas fa-check"></i></button>
            </div>
        </div>
    </div>

    <script>
        let peer, conn, currentCall, localStream, myId;
        let contacts = JSON.parse(localStorage.getItem('p2p_contacts_v4') || '{}');
        let deletedContacts = JSON.parse(localStorage.getItem('p2p_deleted_contacts_v4') || '{}');
        let messageHistory = JSON.parse(localStorage.getItem('p2p_messages_v4') || '{}');
        let myProfile = JSON.parse(localStorage.getItem('p2p_profile_v4') || '{"name": "Usuário", "pic": ""}');
        let activeChatId = null;
        let html5QrCode;
        let mediaRecorder;
        let audioChunks = [];

        // --- INITIALIZATION ---
        function init() {
            const savedId = localStorage.getItem('p2p_my_id_v4');
            myId = savedId || Math.floor(1000 + Math.random() * 9000).toString();
            localStorage.setItem('p2p_my_id_v4', myId);

            Object.keys(contacts).forEach(id => contacts[id] = normalizeContact(id, contacts[id]));
            saveContacts();

            peer = new Peer("apple-p2p-v4-" + myId);
            
            peer.on('open', (id) => {
                document.getElementById('my-id-display').innerText = myId;
                generateQR(myId);
                updateContactsList();
                setInterval(refreshAllStatus, 10000);
            });

            peer.on('connection', (c) => {
                handleIncomingConnection(c);
            });

            peer.on('call', (call) => {
                currentCall = call;
                const id = call.peer.replace('apple-p2p-v4-', '');
                const contact = contacts[id] || { name: "Desconhecido", pic: "", id: id };
                document.getElementById('caller-name').innerText = getContactDisplayName(id, contact);
                document.getElementById('caller-pic').src = contact.pic || 'https://www.w3schools.com/howto/img_avatar.png';
                document.getElementById('incoming-call-modal').style.display = 'flex';
            });

            peer.on('error', (err) => {
                console.error(err);
                if(err.type === 'unavailable-id') {
                    myId = Math.floor(1000 + Math.random() * 9000).toString();
                    localStorage.setItem('p2p_my_id_v4', myId);
                    location.reload();
                }
            });

            document.getElementById('username-input').value = myProfile.name;
            if(myProfile.pic) document.getElementById('my-profile-pic-display').src = myProfile.pic;
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // --- HELPERS ---
        function saveContacts() {
            localStorage.setItem('p2p_contacts_v4', JSON.stringify(contacts));
        }

        function saveDeletedContacts() {
            localStorage.setItem('p2p_deleted_contacts_v4', JSON.stringify(deletedContacts));
        }

        function saveMessages() {
            localStorage.setItem('p2p_messages_v4', JSON.stringify(messageHistory));
        }

        function normalizeContact(id, c) {
            c = c || {};
            return {
                id: c.id || id,
                name: c.name || c.customName || c.profileName || ("Amigo " + id),
                customName: c.customName || c.name || "",
                profileName: c.profileName || "",
                pic: c.pic || ""
            };
        }

        function getContactDisplayName(id, c) {
            c = normalizeContact(id, c);
            return c.customName || c.name || c.profileName || ("Amigo " + id);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text == null ? '' : String(text);
            return div.innerHTML;
        }

        function parseConnectionCode(raw) {
            const text = String(raw || '').trim();
            try {
                const data = JSON.parse(text);
                if(data && data.id) return { id: String(data.id).replace(/\D/g, '').slice(0, 4), name: data.name || '' };
            } catch(e) {}
            return { id: text.replace(/\D/g, '').slice(0, 4), name: '' };
        }

        function rememberMessage(id, content, type) {
            if(!id) return;
            if(!messageHistory[id]) messageHistory[id] = [];
            messageHistory[id].push({ content, type, time: Date.now() });
            if(messageHistory[id].length > 300) messageHistory[id] = messageHistory[id].slice(-300);
            saveMessages();
        }

        function renderMessages(id) {
            const container = document.getElementById('messages');
            container.innerHTML = '';
            (messageHistory[id] || []).forEach(m => addMessage(m.content, m.type, false));
        }

        // --- PROFILE LOGIC ---
        function saveProfile() {
            myProfile.name = document.getElementById('username-input').value || "Usuário";
            localStorage.setItem('p2p_profile_v4', JSON.stringify(myProfile));
            alert("Perfil atualizado com sucesso!");
            if(conn && conn.open) {
                conn.send({type: 'profile_sync', profile: myProfile});
            }
        }

        function updateProfilePic() {
            const file = document.getElementById('profile-pic-input').files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                myProfile.pic = reader.result;
                document.getElementById('my-profile-pic-display').src = reader.result;
                localStorage.setItem('p2p_profile_v4', JSON.stringify(myProfile));
                if(conn && conn.open) conn.send({type: 'profile_sync', profile: myProfile});
            };
            reader.readAsDataURL(file);
        }

        // --- CONTACTS LOGIC ---
        function updateContactsList() {
            const list = document.getElementById('contacts-list');
            list.innerHTML = '';
            const sortedIds = Object.keys(contacts).filter(id => !deletedContacts[id]).sort();
            
            if(sortedIds.length === 0) {
                list.innerHTML = `<div style=\"text-align:center; padding:50px; color:var(--apple-gray);\">Nenhum contato ainda.<br>Clique no + para adicionar.</div>`;
                return;
            }

            sortedIds.forEach(id => {
                const c = contacts[id] = normalizeContact(id, contacts[id]);
                const div = document.createElement('div');
                div.className = 'contact-item';
                div.onclick = () => openChat(id);
                div.innerHTML = `
                    <img class="profile-pic" src="${c.pic || 'https://www.w3schools.com/howto/img_avatar.png'}">
                    <div class="contact-info">
                        <div class="contact-name">${escapeHtml(getContactDisplayName(id, c))}</div>
                        <div class="contact-status" id="list-status-${id}">
                            <span class="status-dot status-offline"></span> Offline
                        </div>
                    </div>
                    <button onclick="showContactProfile('${id}'); event.stopPropagation();" style="background:none; border:none; color:var(--apple-blue); padding:10px;"><i class="fas fa-circle-info"></i></button>
                    <button onclick="deleteContact(event, '${id}')" style="background:none; border:none; color:var(--apple-red); padding:10px;"><i class="fas fa-trash-alt"></i></button>
                `;
                list.appendChild(div);
                checkOnlineStatus(id);
            });
        }

        function refreshAllStatus() {
            Object.keys(contacts).forEach(id => {
                if(!deletedContacts[id]) checkOnlineStatus(id);
            });
        }

        function checkOnlineStatus(id) {
            if(!peer || peer.destroyed || deletedContacts[id]) return;
            const tempConn = peer.connect("apple-p2p-v4-" + id);
            let done = false;
            let timeout = setTimeout(() => {
                if(done) return;
                done = true;
                try { tempConn.close(); } catch(e) {}
                updateStatusUI(id, false);
            }, 3000);

            tempConn.on('open', () => {
                if(done) return;
                done = true;
                clearTimeout(timeout);
                updateStatusUI(id, true);
                try { tempConn.send({type: 'status_probe'}); } catch(e) {}
                setTimeout(() => { try { tempConn.close(); } catch(e) {} }, 120);
            });
            tempConn.on('error', () => {
                if(done) return;
                done = true;
                clearTimeout(timeout);
                updateStatusUI(id, false);
            });
        }

        function updateStatusUI(id, isOnline) {
            const el = document.getElementById('list-status-' + id);
            if(el) {
                el.innerHTML = isOnline ? 
                    `<span class="status-dot status-online"></span> Online` : 
                    `<span class="status-dot status-offline"></span> Offline`;
            }
            if(activeChatId === id) {
                document.getElementById('chat-status-dot').className = 'status-dot ' + (isOnline ? 'status-online' : 'status-offline');
                document.getElementById('chat-status-text').innerText = isOnline ? 'Online' : 'Offline';
            }
        }

        function deleteContact(e, id) {
            e.stopPropagation();
            if(confirm("Deseja realmente excluir este contato?")) {
                delete contacts[id];
                deletedContacts[id] = Date.now();
                saveContacts();
                saveDeletedContacts();
                if(activeChatId === id) {
                    activeChatId = null;
                    if(conn) conn.close();
                    showScreen('main-screen');
                }
                updateContactsList();
            }
        }

        function showContactProfile(id) {
            if(!id || !contacts[id]) return;
            const c = normalizeContact(id, contacts[id]);
            document.getElementById('contact-profile-pic-modal').src = c.pic || 'https://www.w3schools.com/howto/img_avatar.png';
            document.getElementById('contact-profile-name-modal').innerText = getContactDisplayName(id, c);
            document.getElementById('contact-profile-id-modal').innerText = 'Código: ' + id;
            const originalName = c.profileName && c.profileName !== getContactDisplayName(id, c) ? ('Nome do perfil: ' + c.profileName) : '';
            document.getElementById('contact-profile-saved-name-modal').innerText = originalName;
            document.getElementById('contact-profile-modal').style.display = 'flex';
        }

        // --- SCANNER LOGIC ---
        function startScanner() {
            document.getElementById('scanner-placeholder').style.display = 'none';
            document.getElementById('start-scan-btn').style.display = 'none';
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
                (decodedText) => {
                    stopScanner();
                    const parsed = parseConnectionCode(decodedText);
                    let name = document.getElementById('contact-name-input').value.trim() || parsed.name;
                    if(!name) name = prompt('Digite o nome deste contato:') || '';
                    addContact(parsed.id, name);
                },
                (errorMessage) => {}
            ).catch(err => {
                alert("Erro ao abrir câmera: " + err);
                stopScanner();
            });
        }

        function stopScanner() {
            document.getElementById('scanner-placeholder').style.display = 'flex';
            document.getElementById('start-scan-btn').style.display = 'block';
            if(html5QrCode) {
                html5QrCode.stop().then(() => html5QrCode = null).catch(() => {});
            }
        }

        function addContactManual() {
            const id = document.getElementById('manual-id-input').value.replace(/\D/g, '').slice(0, 4);
            const name = document.getElementById('contact-name-input').value.trim();
            if(/^\d{4}$/.test(id)) addContact(id, name);
            else alert("O código deve ter 4 dígitos.");
        }

        function addContact(id, name) {
            id = String(id || '').replace(/\D/g, '').slice(0, 4);
            if(!/^\d{4}$/.test(id)) {
                alert("Código inválido. Use exatamente 4 dígitos.");
                return;
            }
            if(id === myId) {
                alert("Você não pode adicionar a si mesmo.");
                return;
            }
            delete deletedContacts[id];
            saveDeletedContacts();
            const current = normalizeContact(id, contacts[id]);
            const chosenName = (name || '').trim() || current.customName || current.profileName || ("Amigo " + id);
            contacts[id] = {
                id: id,
                name: chosenName,
                customName: chosenName,
                profileName: current.profileName || '',
                pic: current.pic || ''
            };
            saveContacts();
            document.getElementById('manual-id-input').value = '';
            document.getElementById('contact-name-input').value = '';
            updateContactsList();
            showScreen('main-screen');
            openChat(id);
        }

        // --- CHAT LOGIC ---
        function openChat(id, existingConn) {
            if(!contacts[id] || deletedContacts[id]) return;
            activeChatId = id;
            const c = contacts[id] = normalizeContact(id, contacts[id]);
            document.getElementById('chat-username').innerText = getContactDisplayName(id, c);
            document.getElementById('chat-profile-pic').src = c.pic || 'https://www.w3schools.com/howto/img_avatar.png';
            renderMessages(id);
            showScreen('chat-screen');

            if(existingConn) {
                if(conn && conn !== existingConn) conn.close();
                conn = existingConn;
                setupConnectionHandlers(conn);
                return;
            }

            if(conn && conn.open && conn.peer === "apple-p2p-v4-" + id) return;
            if(conn) conn.close();
            conn = peer.connect("apple-p2p-v4-" + id, { reliable: true });
            setupConnectionHandlers(conn);
        }

        function handleIncomingConnection(c) {
            const id = c.peer.replace('apple-p2p-v4-', '');
            let firstDataHandled = false;

            c.on('data', data => {
                if(!firstDataHandled) {
                    firstDataHandled = true;
                    if(data && data.type === 'status_probe') {
                        try { c.close(); } catch(e) {}
                        return;
                    }
                    if(deletedContacts[id] && activeChatId !== id) {
                        try { c.close(); } catch(e) {}
                        return;
                    }
                    if(!contacts[id]) {
                        contacts[id] = normalizeContact(id, { name: "Novo Amigo", customName: "Novo Amigo" });
                        saveContacts();
                        updateContactsList();
                    }
                    if(activeChatId !== id) openChat(id, c);
                    else {
                        if(conn && conn !== c) conn.close();
                        conn = c;
                        setupConnectionHandlers(c);
                    }
                }
                processIncomingData(c, data);
            });

            c.on('open', () => {
                if(activeChatId === id) updateStatusUI(id, true);
            });
            c.on('close', () => {
                if(activeChatId === id) updateStatusUI(id, false);
            });
        }

        function setupConnectionHandlers(c) {
            if(!c || c._handlersReady) return;
            c._handlersReady = true;
            c.on('open', () => {
                const id = c.peer.replace('apple-p2p-v4-', '');
                updateStatusUI(id, true);
                c.send({type: 'profile_sync', profile: myProfile});
            });
            c.on('data', data => processIncomingData(c, data));
            c.on('close', () => {
                if(activeChatId === c.peer.replace('apple-p2p-v4-', '')) {
                    updateStatusUI(activeChatId, false);
                }
            });
            c.on('error', () => {
                if(activeChatId === c.peer.replace('apple-p2p-v4-', '')) {
                    updateStatusUI(activeChatId, false);
                }
            });
        }

        function processIncomingData(c, data) {
            if(!data || data.type === 'status_probe') return;
            const id = c.peer.replace('apple-p2p-v4-', '');
            if(deletedContacts[id] && activeChatId !== id) return;

            if(!contacts[id]) {
                contacts[id] = normalizeContact(id, { name: "Novo Amigo", customName: "Novo Amigo" });
                saveContacts();
            }

            if(data.type === 'profile_sync') {
                contacts[id] = normalizeContact(id, contacts[id]);
                contacts[id].profileName = data.profile.name || contacts[id].profileName || '';
                contacts[id].pic = data.profile.pic || contacts[id].pic || '';
                contacts[id].name = contacts[id].customName || contacts[id].profileName || ("Amigo " + id);
                saveContacts();
                if(activeChatId === id) {
                    document.getElementById('chat-username').innerText = getContactDisplayName(id, contacts[id]);
                    document.getElementById('chat-profile-pic').src = contacts[id].pic || 'https://www.w3schools.com/howto/img_avatar.png';
                }
                updateContactsList();
            } else if(data.type === 'text') {
                const safe = escapeHtml(data.content);
                rememberMessage(id, safe, 'them');
                if(activeChatId === id) addMessage(safe, 'them', false);
            } else if(data.type === 'file') {
                const blob = new Blob([data.payload], {type: data.mime});
                const url = URL.createObjectURL(blob);
                let html = '';
                if(data.mime.startsWith('image/')) html = `<img src="${url}" onclick="window.open('${url}')">`;
                else if(data.mime.startsWith('video/')) html = `<video controls src="${url}"></video>`;
                else if(data.mime.startsWith('audio/')) html = `<audio controls src="${url}"></audio>`;
                else html = `<a href="${url}" download="${escapeHtml(data.name)}" style="color:inherit; text-decoration:none; display:flex; align-items:center; gap:10px;"><i class="fas fa-file-alt" style="font-size:24px;"></i> ${escapeHtml(data.name)}</a>`;
                rememberMessage(id, html, 'them');
                if(activeChatId === id) addMessage(html, 'them', false);
            }
        }

        function ensureConnection(callback) {
            if(conn && conn.open && activeChatId && conn.peer === "apple-p2p-v4-" + activeChatId) {
                callback(conn);
                return;
            }
            if(!activeChatId) return;
            if(conn) conn.close();
            conn = peer.connect("apple-p2p-v4-" + activeChatId, { reliable: true });
            setupConnectionHandlers(conn);
            conn.on('open', () => callback(conn));
            conn.on('error', () => alert('Não foi possível conectar. Verifique se o contato está online.'));
        }

        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if(!text || !activeChatId) return;
            const safe = escapeHtml(text);
            input.value = '';
            ensureConnection((openConn) => {
                openConn.send({type: 'text', content: text});
                rememberMessage(activeChatId, safe, 'me');
                addMessage(safe, 'me', false);
            });
        }

        function addMessage(content, type, save = true) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = content;
            const container = document.getElementById('messages');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            if(save && activeChatId) rememberMessage(activeChatId, content, type);
        }

        function sendFile() {
            const file = document.getElementById('file-input').files[0];
            if(!file || !activeChatId) return;
            const reader = new FileReader();
            reader.onload = () => {
                ensureConnection((openConn) => {
                    openConn.send({type: 'file', name: file.name, mime: file.type, payload: reader.result});
                    const url = URL.createObjectURL(file);
                    let html = '';
                    if(file.type.startsWith('image/')) html = `<img src="${url}">`;
                    else if(file.type.startsWith('video/')) html = `<video controls src="${url}"></video>`;
                    else if(file.type.startsWith('audio/')) html = `<audio controls src="${url}"></audio>`;
                    else html = `<i class="fas fa-file"></i> ${escapeHtml(file.name)}`;
                    rememberMessage(activeChatId, html, 'me');
                    addMessage(html, 'me', false);
                });
            };
            reader.readAsArrayBuffer(file);
            document.getElementById('file-input').value = '';
        }

        // --- CALL LOGIC ---
        async function startCall(video) {
            try {
                if(!conn || !conn.peer) {
                    alert('Abra um contato online antes de iniciar a chamada.');
                    return;
                }
                localStream = await navigator.mediaDevices.getUserMedia({video: video, audio: true});
                document.getElementById('local-video').srcObject = localStream;
                document.getElementById('video-call-overlay').style.display = 'flex';
                const call = peer.call(conn.peer, localStream);
                setupCallHandlers(call);
            } catch (err) {
                alert("Erro ao acessar câmera/microfone: " + err);
            }
        }

        function acceptCall() {
            document.getElementById('incoming-call-modal').style.display = 'none';
            navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(stream => {
                localStream = stream;
                document.getElementById('local-video').srcObject = stream;
                document.getElementById('video-call-overlay').style.display = 'flex';
                currentCall.answer(stream);
                setupCallHandlers(currentCall);
            });
        }

        function rejectCall() {
            document.getElementById('incoming-call-modal').style.display = 'none';
            if(currentCall) currentCall.close();
        }

        function setupCallHandlers(call) {
            currentCall = call;
            call.on('stream', rs => {
                document.getElementById('remote-video').srcObject = rs;
            });
            call.on('close', () => endCall());
        }

        function endCall() {
            if(currentCall) currentCall.close();
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            document.getElementById('video-call-overlay').style.display = 'none';
        }

        function toggleMute() {
            if(!localStream) return;
            const audioTrack = localStream.getAudioTracks()[0];
            if(!audioTrack) return;
            audioTrack.enabled = !audioTrack.enabled;
            document.getElementById('call-mute-icon').className = audioTrack.enabled ? 'fas fa-microphone' : 'fas fa-microphone-slash';
        }

        function toggleCamera() {
            if(!localStream) return;
            const videoTrack = localStream.getVideoTracks()[0];
            if(!videoTrack) return;
            videoTrack.enabled = !videoTrack.enabled;
            document.getElementById('call-camera-icon').className = videoTrack.enabled ? 'fas fa-video' : 'fas fa-video-slash';
        }

        // --- VOICE RECORDING ---
        const voiceBtn = document.getElementById('voice-btn');
        voiceBtn.onmousedown = async () => {
            try {
                if(!activeChatId) return;
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/ogg; codecs=opus' });
                    const reader = new FileReader();
                    reader.onload = () => {
                        ensureConnection((openConn) => {
                            openConn.send({type: 'file', name: 'audio.ogg', mime: 'audio/ogg', payload: reader.result});
                            const html = `<audio controls src="${URL.createObjectURL(blob)}"></audio>`;
                            rememberMessage(activeChatId, html, 'me');
                            addMessage(html, 'me', false);
                        });
                    };
                    reader.readAsArrayBuffer(blob);
                    stream.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start();
                document.getElementById('recording-ui').style.display = 'flex';
            } catch (err) { alert(err); }
        };
        voiceBtn.onmouseup = () => {
            if(mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                document.getElementById('recording-ui').style.display = 'none';
            }
        };
        voiceBtn.ontouchstart = (e) => { e.preventDefault(); voiceBtn.onmousedown(); };
        voiceBtn.ontouchend = (e) => { e.preventDefault(); voiceBtn.onmouseup(); };

        function generateQR(text) {
            const qr = qrcode(0, 'M');
            qr.addData(text);
            qr.make();
            document.getElementById('qrcode-display').innerHTML = qr.createImgTag(6);
        }

        document.getElementById('message-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        init();
    </script>
</body>
</html>

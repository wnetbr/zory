<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-1 Premium</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root {
            --apple-blue: #007AFF;
            --apple-bg: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(0, 0, 0, 0.08);
            --text-main: #1d1d1f;
            --text-sec: #86868b;
            --apple-red: #ff3b30;
            --system-gray: #f2f2f7;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            margin: 0;
            font-family: "SF Pro Display", -apple-system, sans-serif;
            background-color: #000;
            background-image: radial-gradient(at 0% 0%, rgba(0,122,255,0.15) 0px, transparent 50%), white;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 40px;
            width: 92%;
            max-width: 400px;
            max-height: 90vh;
            padding: 30px 25px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        h1 { font-size: 34px; font-weight: 800; margin: 0 0 5px; letter-spacing: -1.5px; }
        .sub-status { color: var(--text-sec); font-size: 13px; margin-bottom: 25px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }

        .apple-btn {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .apple-btn svg { width: 24px; height: 24px; stroke: var(--apple-blue); fill: none; stroke-width: 2.5; transition: transform 0.3s ease; }
        .apple-btn:active { transform: scale(0.95); }

        .btn-connect {
            grid-column: span 2;
            background: var(--apple-blue);
            border: none;
            padding: 18px;
            border-radius: 18px;
            color: white;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
        }

        input[type="text"] {
            width: 100%; background: rgba(0,0,0,0.05); border: 1px solid transparent;
            border-radius: 15px; padding: 15px; text-align: center; font-size: 20px; 
            font-weight: 700; margin: 10px 0;
        }

        /* ÁREA DE CONTEÚDO MIXTO */
        #content-area {
            margin-top: 15px;
            text-align: left;
            overflow-y: auto;
            flex: 1;
            padding-right: 5px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* BALÕES DE CHAT */
        .chat-bubble {
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 14px;
            max-width: 80%;
            line-height: 1.4;
            animation: fadeIn 0.3s ease;
        }
        .sent { background: var(--apple-blue); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .received { background: #e9e9eb; color: var(--text-main); align-self: flex-start; border-bottom-left-radius: 4px; }

        /* ESTILO ARQUIVO */
        .file-item {
            background: rgba(255,255,255,0.6);
            border: 1px solid var(--glass-border);
            padding: 12px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            width: 100%;
        }
        .file-icon { font-size: 20px; background: #fff; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 10px; }
        .file-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }

        .chat-input-bar {
            display: flex;
            gap: 8px;
            padding-top: 15px;
            margin-top: 10px;
            border-top: 1px solid var(--glass-border);
        }
        #message-input {
            flex: 1; background: rgba(0,0,0,0.05); border: none;
            border-radius: 20px; padding: 12px 15px; font-size: 14px;
        }

        #qr-modal, #scanner-modal {
            display: none; position: fixed; inset: 0; background: #fff;
            z-index: 999; flex-direction: column; align-items: center; justify-content: center;
        }
        #reader { width: 100% !important; max-width: 350px; border-radius: 20px; overflow: hidden; }
        
        .status-dot { width: 8px; height: 8px; background: var(--apple-red); border-radius: 50%; transition: 0.3s; }
        .online { background: #34c759; box-shadow: 0 0 10px #34c759; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="glass-container">
        <h1>Z-1</h1>
        <div class="sub-status">
            <div class="status-dot" id="dot"></div>
            <span id="status-text">Conectando...</span>
        </div>

        <div id="setup-view">
            <div class="action-grid">
                <button class="apple-btn" onclick="openQR()">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    MEU QR
                </button>
                <button class="apple-btn" onclick="openScanner()">
                    <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h18a2 2 0 0 1 2 2z"></path><path d="M12 8v8"></path><path d="M8 12h8"></path></svg>
                    ESCANEAR
                </button>
            </div>
            <input type="text" id="manual-id" maxlength="4" placeholder="CÓDIGO ID">
            <button class="btn-connect" onclick="connectManual()">Conectar agora</button>
        </div>

        <div id="transfer-view" style="display:none; flex-direction: column; height: 100%;">
            <div style="display: flex; gap: 8px;">
                <button class="apple-btn" style="flex: 1; border-style: dashed; border-color: var(--apple-blue); flex-direction: row; padding: 10px;" onclick="document.getElementById('file-input').click()">
                    <svg viewBox="0 0 24 24" style="width:18px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    MIDIA
                </button>
                <button onclick="disconnect()" style="background:none; border:none; color:var(--apple-red); font-weight:700; cursor:pointer; font-size: 11px;">SAIR</button>
            </div>

            <div id="content-area"></div>

            <div class="chat-input-bar">
                <input type="text" id="message-input" placeholder="Mensagem...">
                <button class="apple-btn" onclick="sendTextMessage()" style="padding:10px; border-radius:50%; width:40px; height:40px; background:var(--apple-blue);">
                    <svg viewBox="0 0 24 24" style="stroke:white; width:18px;"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>

            <input type="file" id="file-input" hidden>
        </div>
    </div>

    <div id="qr-modal" onclick="this.style.display='none'">
        <div id="qrcode"></div>
        <p style="font-weight:700; margin-top:20px;">Código de conexão</p>
    </div>

    <div id="scanner-modal">
        <div id="reader"></div>
        <button onclick="stopScanner()" style="margin-top:30px; padding:15px 40px; border-radius:20px; border:none; background:var(--apple-red); color:white; font-weight:700;">CANCELAR</button>
    </div>

    <script>
        let peer, conn;
        const statusText = document.getElementById('status-text');
        const dot = document.getElementById('dot');
        const contentArea = document.getElementById('content-area');
        const shortId = Math.floor(1000 + Math.random() * 9000).toString();

        peer = new Peer(shortId);

        peer.on('open', (id) => {
            dot.classList.add('online');
            statusText.innerHTML = `Online • ID: <strong>${id}</strong>`;
            new QRCode(document.getElementById("qrcode"), { text: id, width: 200, height: 200 });
        });

        // Receber conexão
        peer.on('connection', (incomingConn) => {
            conn = incomingConn;
            setupConnEvents();
            initTransferUI();
        });

        function setupConnEvents() {
            conn.on('data', (data) => {
                if(data === "DISCONNECT") { resetToHome(); return; }
                
                // Lógica de recebimento
                if (data.type === 'text') {
                    displayMessage(data.content, 'received');
                } else if (data.file) {
                    displayFile(data, 'received');
                }
            });
            conn.on('close', resetToHome);
        }

        // Funções de Mensagem
        function sendTextMessage() {
            const input = document.getElementById('message-input');
            const msg = input.value.trim();
            if(!msg || !conn) return;

            const data = { type: 'text', content: msg };
            conn.send(data);
            displayMessage(msg, 'sent');
            input.value = '';
        }

        function displayMessage(text, side) {
            const bubble = document.createElement('div');
            bubble.className = `chat-bubble ${side}`;
            bubble.innerText = text;
            contentArea.appendChild(bubble);
            contentArea.scrollTop = contentArea.scrollHeight;
        }

        // Funções de Arquivo
        document.getElementById('file-input').onchange = (e) => {
            const file = e.target.files[0];
            if(!file || !conn) return;
            
            const reader = new FileReader();
            reader.onload = () => {
                const dataObj = { 
                    file: reader.result, 
                    name: file.name, 
                    fileType: file.type 
                };
                conn.send(dataObj);
                displayFile(dataObj, 'sent');
            };
            reader.readAsArrayBuffer(file);
        };

        function displayFile(data, side) {
            const blob = new Blob([data.file], { type: data.fileType });
            const url = URL.createObjectURL(blob);
            const item = document.createElement('div');
            item.className = 'file-item';
            item.style.alignSelf = side === 'sent' ? 'flex-end' : 'flex-start';
            
            let icon = '📄';
            if(data.fileType.includes('image')) icon = '🖼️';
            if(data.fileType.includes('video')) icon = '🎬';

            item.innerHTML = `<div class="file-icon">${icon}</div><div class="file-name">${data.name}</div>`;
            item.onclick = () => {
                const a = document.createElement('a');
                a.href = url;
                a.download = data.name;
                a.click();
            };
            contentArea.appendChild(item);
            contentArea.scrollTop = contentArea.scrollHeight;
        }

        // Sistema de IDs e Scanner
        function openQR() { document.getElementById('qr-modal').style.display = 'flex'; }
        function openScanner() {
            document.getElementById('scanner-modal').style.display = 'flex';
            window.activeScanner = new Html5Qrcode("reader");
            window.activeScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (id) => {
                document.getElementById('manual-id').value = id;
                stopScanner();
                connectManual();
            });
        }
        function stopScanner() {
            if(window.activeScanner) window.activeScanner.stop().then(() => document.getElementById('scanner-modal').style.display = 'none');
        }

        function connectManual() {
            const id = document.getElementById('manual-id').value;
            if(!id) return;
            conn = peer.connect(id);
            conn.on('open', () => {
                setupConnEvents();
                initTransferUI();
            });
        }

        function initTransferUI() {
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('transfer-view').style.display = 'flex';
            statusText.innerText = "Conectado";
        }

        function resetToHome() { location.reload(); }
        function disconnect() { if(conn) { conn.send("DISCONNECT"); setTimeout(resetToHome, 500); } }

        document.getElementById('message-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendTextMessage(); });
    </script>
</body>
</html>
